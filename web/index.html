<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scraper Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-gray-100 text-gray-800">
  <div id="app" class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-slate-900 text-white flex flex-col shrink-0 transition-all duration-300 md:translate-x-0 -translate-x-full fixed md:relative z-20 h-full">
      <div class="p-5 border-b border-slate-700">
        <h1 class="text-xl font-bold tracking-wide">Scraper Admin</h1>
      </div>
      <nav class="flex-1 overflow-y-auto py-4">
        <ul class="space-y-1 px-3">
          <li>
            <a href="#/" class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-700 transition" data-page="dashboard">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
              概览
            </a>
          </li>
          <li>
            <a href="#/scrape" class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-700 transition" data-page="scrape">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
              刮削任务
            </a>
          </li>
          <li>
            <a href="#/jobs" class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-700 transition" data-page="jobs">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
              任务列表
            </a>
          </li>
          <li>
            <a href="#/feeds" class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-700 transition" data-page="feeds">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
              Feed 订阅
            </a>
          </li>
          <li>
            <a href="#/feed-scrape" class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-700 transition" data-page="feed-scrape">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              Feed 刮削
            </a>
          </li>
          <li>
            <a href="#/plugins" class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-700 transition" data-page="plugins">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"/></svg>
              插件管理
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Mobile overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-10 hidden md:hidden"></div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0">
      <!-- Top bar -->
      <header class="bg-white border-b border-gray-200 px-5 py-3 flex items-center justify-between shrink-0">
        <button id="menu-toggle" class="md:hidden p-2 rounded hover:bg-gray-100">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="text-sm text-gray-500" id="page-title">概览</div>
        <div class="text-xs text-gray-400" id="api-status">API: <span class="text-gray-400">checking...</span></div>
      </header>

      <!-- Content area -->
      <div id="content" class="flex-1 overflow-y-auto p-5">
        <!-- Page content injected here -->
      </div>
    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
